<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcards</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script src="/assets/js/main.js"></script>
  </head>
  <body>
    <header>
      <h1>Flashcards</h1>
    </header>
    <main>
      <div class="registration">
        <textarea class="registration__input" rows="10"></textarea>
        <button class="registration__start" onclick="startStudySession()">Start</button>
      </div>
      <div class="study-session hidden">
        <div class="study-session__card current-card">
          <p class="current-card__writing"></p>
          <p class="current-card__reading concealed"></p>
          <p class="current-card__meaning concealed"></p>
        </div>
        <div class="study-session__card-log card-log">
          <p class="card-log__writing"></p>
          <p class="card-log__reading concealed"></p>
          <p class="card-log__meaning concealed"></p>
        </div>
        <input class="study-session__input" type="text">
      </div>
    </main>
  </body>
</html>
